# This workflow will install JQ dependencies, run tests and lint with a single version of JQ

name: JSON Validator

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "main" branch
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

permissions:
  contents: read

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  json-yaml-validate:
    runs-on: ubuntu-latest
    name: Run internal json self-check
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v6

      - name: json-yaml-validate
        id: json-yaml-validate
        uses: GrantBirki/json-yaml-validate@v4 # You can adjust to latest version here
        with:
          json_schema: schemas/status-events-schema.json # schema to validate JSON files against
